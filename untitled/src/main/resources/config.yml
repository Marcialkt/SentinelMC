# ╔══════════════════════════════════════════════════════════╗
# ║           SentinelMC v1.0.0 — Configuration              ║
# ║              Author: MarcialKT                           ║
# ║        modrinth.com/plugin/sentinelmc                    ║
# ╚══════════════════════════════════════════════════════════╝
#
# After editing, restart your server (do NOT use /reload).
# Supports & color codes throughout.
# Validate YAML at: https://yaml-online-parser.appspot.com

# ────────────────────────────────────────────────────────────
#  GENERAL
# ────────────────────────────────────────────────────────────

# Prefix shown before all Sentinel messages.
prefix: "&8[&bSentinel&8] &r"

# ────────────────────────────────────────────────────────────
#  RANK HIERARCHY — for Staff Warn demotion (LuckPerms)
#  List from HIGHEST to LOWEST.
#  Names must EXACTLY match your LuckPerms group names.
#  Example: run /lp group list to see your group names.
# ────────────────────────────────────────────────────────────
rank-hierarchy:
  - owner
  - admin
  - mod
  - helper
  - member

# ────────────────────────────────────────────────────────────
#  STAFF WARNS  (sentinel.owner only)
# ────────────────────────────────────────────────────────────
staff-warns:
  # How many warns before demotion becomes available.
  max-warns: 3

  # Automatically clear all warns after a demotion is executed.
  clear-after-demotion: true

# ────────────────────────────────────────────────────────────
#  BROADCAST — which actions are announced to online staff
# ────────────────────────────────────────────────────────────
broadcast:
  bans: true
  kicks: true
  staff-warns: true
  freeze: true
  shadow-jail: true
  demotions: true

# ────────────────────────────────────────────────────────────
#  MESSAGES
#  Placeholders: %reason%, %player%, %staff%
#  Use \n for line breaks.
# ────────────────────────────────────────────────────────────
messages:
  ban-screen: "&c&l☠ YOU ARE BANNED FROM THIS SERVER\n&7Reason: &f%reason%\n&7Contact staff to appeal."
  maintenance-kick: "&b&lServer Maintenance\n&7We'll be back soon. Stay tuned!"
  kick-screen: "&cYou have been kicked by a staff member."
  frozen-login: "&b&lYou are still frozen. Please wait for a staff member."
  shadow-jail-login: "&8You are still under staff investigation."

# ────────────────────────────────────────────────────────────
#  VANISH
# ────────────────────────────────────────────────────────────
vanish:
  # Staff with sentinel.use always see each other even when vanished.
  staff-see-staff: true

# ────────────────────────────────────────────────────────────
#  GHOST MODE
# ────────────────────────────────────────────────────────────
ghost:
  notify-on-inspect: true
  notify-message: "&8[Ghost] Silently inspecting container..."

# ────────────────────────────────────────────────────────────
#  FREEZE
# ────────────────────────────────────────────────────────────
freeze:
  # Allow camera rotation (yaw/pitch) while position is locked.
  allow-camera-rotation: true

# ────────────────────────────────────────────────────────────
#  PUNISHMENTS
# ────────────────────────────────────────────────────────────
punishments:
  sky-launch:
    velocity-y: 5.5

  ignite:
    ticks: 200         # 10 seconds

  wither:
    duration-ticks: 200
    amplifier: 1       # Wither II

  nausea:
    duration-ticks: 300
    amplifier: 1       # Nausea II

  divine-smite:
    strike-count: 2    # Number of lightning strikes
    delay-ticks: 8     # Delay between each strike

# ────────────────────────────────────────────────────────────
#  PLAYER LIST GUI
# ────────────────────────────────────────────────────────────
player-list:
  max-display: 45      # Max players shown (1-45)
  sort-by: last_seen   # "last_seen" or "name"

# ────────────────────────────────────────────────────────────
#  DATABASE  (SQLite)
# ────────────────────────────────────────────────────────────
database:
  file: sentinel.db    # Relative to plugins/SentinelMC/